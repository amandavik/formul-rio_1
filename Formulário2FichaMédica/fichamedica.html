<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/processar" method="post">
        <header>
            <h1>Ficha Médica:</h1>
        </header>
        <main>
            <p>
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome aqui..." required>
            </p>

            <p>
                <label for="data de nascimento">Data De Nascimento:</label><br>
                <input type="date" id="data de nascimento" name="data de nascimento" required>
            </p>

            <p>
                <label for="convenio">Possui Convênio:</label><br>
                
                <input type="radio" id="select" name="opcao" value="sim">
                <label for="sim">Sim</label>

                <input type="radio" id="select" name="opcao" value="nao">
                <label for="nao">Não</label><br>

                <input type="text" id="se_sim" name="se_sim" placeholder="Se sim digite qual...">
            </p>

            <p>
                <label for="tipo_sanguinio">Tipo Sanguíneo:</label><br>
                
                <input type="radio" id="select" name="tipo_sanguinio" value="A+">
                <label for="A+">A+</label>

                <input type="radio" id="select" name="tipo_sanguinio" value="A-">
                <label for="A-">A-</label><br>

                <input type="radio" id="select" name="tipo_sanguinio" value="B+">
                <label for="B+">B+</label>

                <input type="radio" id="select" name="tipo_sanguinio" value="B-">
                <label for="B-">B-</label><br>

                <input type="radio" id="select" name="tipo_sanguinio" value="O+">
                <label for="O+">O+</label>

                <input type="radio" id="select" name="tipo_sanguinio" value="O-">
                <label for="O-">O-</label><br>

                <input type="radio" id="select" name="tipo_sanguinio" value="AB+">
                <label for="AB+">AB+</label>

                <input type="radio" id="select" name="tipo_sanguinio" value="AB-">
                <label for="AB-">AB-</label>
            </p>

            <p>
                <label for="fuma">Você é fumante::</label><br>
                
                <input type="radio" id="select" name="fuma" value="sim">
                <label for="sim">Sim</label>

                <input type="radio" id="select" name="fuma" value="nao">
                <label for="nao">Não</label><br>
            </p>

            <p>
                <label for="alergia">Possui Alergia:</label><br>
                
                <input type="radio" id="select" name="alergia" value="sim">
                <label for="sim">Sim</label>

                <input type="radio" id="select" name="alergia" value="nao">
                <label for="nao">Não</label><br>

                <input type="text" id="se_sim" name="se_sim" placeholder="Se sim digite qual...">
            </p>

            <p>
                <label for="medicamento">Possui Convênio:</label><br>
                
                <input type="radio" id="select" name="medicamento" value="sim">
                <label for="sim">Sim</label>

                <input type="radio" id="select" name="medicamento" value="nao">
                <label for="nao">Não</label><br>

                <input type="text" id="se_sim" name="se_sim" placeholder="Se sim digite qual...">
            </p>

            <p>
                <label for="bebida">Consome Bebida Alcóolica:</label><br>
                
                <input type="radio" id="select" name="bebida" value="sim">
                <label for="sim">Sim</label>

                <input type="radio" id="select" name="bebida" value="nao">
                <label for="nao">Não</label>
            </p>

            <p>
                <label for="telefone">Contato</label><br>
                <input type="tel" name="telefone" pattern="\(\d{2}\)[\s]9\d{4}-\d{4}" placeholder="(xx)xxxxx-xxxx" required>
            </p>

            <button type='submit'>Enviar</button>
        </form>
        </main>
</body>
<footer>Escola Clodoveu Barbosa - 2026</footer>
</html>
