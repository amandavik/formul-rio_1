<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/processar" method="post">
        <header>
            <h1>Formulário De Inscrição:</h1>
        </header>
        <main>
            <p>
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome aqui..." required>
            </p>

            <p>
                <label for="idade">Idade:</label><br>
                <input type="number" id="idade" name="idade" placeholder="Digite sua idade aqui..." required>
            </p>

            <p>
                <label for="data de nascimento">Data De Nascimento:</label><br>
                <input type="date" id="data de nascimento" name="data de nascimento" required>
            </p>

            <p>
                <label for="cidade natal">Cidade Natal:</label><br>
                <input type="text" id="cidade natal" name="cidade natal" placeholder="Digite aqui a cidade..." required>
            </p>

            <P>
                <label for="curso">Curso:</label><br>
                <input type="text" id="curso" name="curso" placeholder="Digite seu curso aqui..." required>
            </P>

            <p>
                <label for="cidade em que mora">Cidade Em Que Mora:</label><br>
                <input type="text" id="cidade em que mora" name="cidade em que mora" placeholder="Digite aqui a cidade..." required>
            </p>

            <button type='submit'>Enviar</button>
        </form>
        </main>
</body>
<footer>Escola Clodoveu Barbosa - 2026</footer>
</html>
